<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Bangers&amp;display=swap');</style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1434"/>
      <stop offset="45%" stop-color="#162050"/>
      <stop offset="100%" stop-color="#0A1228"/>
    </linearGradient>
    <linearGradient id="accG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#FF4500"/>
    </linearGradient>
    <linearGradient id="glassG" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="shineG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.00"/>
    </linearGradient>
    <linearGradient id="txtG" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#B8C8F0"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
    <filter id="orbBlur"><feGaussianBlur stdDeviation="32"/></filter>
    <filter id="orbBlur2"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="txtGlow" x="-15%" y="-30%" width="130%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feFlood flood-color="#FFFFFF" flood-opacity="0.25" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feFlood flood-color="#FF6B35" flood-opacity="0.8" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="512" height="512" fill="url(#bg)"/>
    <circle cx="390" cy="390" r="180" fill="#FF5A1E" opacity="0.22" filter="url(#orbBlur)"/>
    <circle cx="105" cy="108" r="145" fill="#3A7AEE" opacity="0.20" filter="url(#orbBlur)"/>
    <circle cx="420" cy="95" r="80" fill="#FFFFFF" opacity="0.05" filter="url(#orbBlur2)"/>
    <rect x="28" y="28" width="456" height="456" rx="90" ry="90" fill="url(#glassG)" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <rect x="28" y="28" width="456" height="120" rx="90" ry="90" fill="url(#shineG)"/>
    <text x="256" y="200" font-family="Bangers, Impact, 'Arial Black', sans-serif" font-size="170" letter-spacing="10" text-anchor="middle" fill="url(#txtG)" filter="url(#txtGlow)">MON</text>
    <text x="256" y="300" font-family="Bangers, Impact, 'Arial Black', sans-serif" font-size="86" letter-spacing="6" text-anchor="middle" fill="url(#txtG)" filter="url(#txtGlow)" opacity="0.93">ASSISTANT</text>
    <rect x="72" y="314" width="368" height="2.5" rx="1.5" fill="url(#accG)" opacity="0.75"/>
    <text x="256" y="384" font-family="Bangers, Impact, 'Arial Black', sans-serif" font-size="70" letter-spacing="9" text-anchor="middle" fill="#FF8C42" opacity="0.92">SCOLAIRES</text>
    <circle cx="256" cy="430" r="11" fill="#FF6B35" filter="url(#dotGlow)"/>
    <rect x="1.5" y="1.5" width="509" height="509" rx="111" ry="111" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2.5"/>
    <circle cx="82" cy="380" r="1.8" fill="#FFFFFF" opacity="0.45"/>
    <circle cx="430" cy="420" r="1.5" fill="#FFFFFF" opacity="0.38"/>
    <circle cx="455" cy="78" r="2.2" fill="#FF9060" opacity="0.55"/>
    <circle cx="68" cy="68" r="1.6" fill="#FFFFFF" opacity="0.38"/>
    <circle cx="462" cy="268" r="1.4" fill="#FFFFFF" opacity="0.30"/>
    <circle cx="52" cy="310" r="1.7" fill="#6090FF" opacity="0.48"/>
  </g>
</svg>
